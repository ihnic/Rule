name: 自动更新规则流水线

on:
  push:
    paths:
      - 'custom/**'
      - 'rules.txt'
      - 'main.py'
  schedule:
    - cron: '0 19 * * *' # 国际标准时 19:00，即北京时间凌晨 03:00
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 设置 Mihomo 执行权限
        run: chmod +x ./mihomo-core # 假设你上传的二进制文件名为 mihomo

      - name: 执行转换脚本
        run: python main.py

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff-index --quiet HEAD || git commit -m "自动更新规则: $(date +'%Y-%m-%d %H:%M')"
          git push