name: 规则自动化更新

on:
  push:
    paths:
      - 'custom/**'
      - 'rules.txt'
      - 'main.py'
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    # --- 关键：手动触发时可选是否强制更新 ---
    inputs:
      force_update:
        description: '是否强制重写所有规则文件'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests

      - name: 权限与环境检查
        run: |
          chmod +x ./mihomo-core
          if [ -f "mihomo" ]; then rm -f mihomo; fi 

      - name: 执行转换
        # 将 GitHub 的输入参数传递给 Python 环境变量
        env:
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: python main.py

      - name: 推送更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff-index --quiet HEAD || git commit -m "Update Rules $(date +'%Y-%m-%d %H:%M')"
          git push